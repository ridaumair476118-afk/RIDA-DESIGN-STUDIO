<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rida Design Studio</title>
    <script>
        // Automatic routing for Vite subfolder
        var path = window.location.pathname;
        if (!path.endsWith('/')) path += '/';
        window.location.href = window.location.origin + path + "src/";
    </script>
</head>
<body>
    <p>Redirecting to Rida Design Studio...</p>
</body>
</html>
